// sensitivity
sensitivity .3413
zoom_sensitivity_ratio .8198

// Movement binds
bind "mwheeldown" "+jump"

// Weapon binds
bind "p" "slot7" // flashbang
bind "4" "slot8" // smoke

// Practice binds
bind "u" "sv_rethrow_last_grenade"
bind "alt" "noclip"

// UI settings
cl_teamid_overhead_mode 3 // weapons over head
cl_teamcounter_playercount_instead_of_avatars true
con_enable true
bind "F4" "toggleconsole"