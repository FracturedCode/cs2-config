// sensitivity
sensitivity .3413
zoom_sensitivity_ratio .8198

// Crosshair
cl_crosshairstyle 4
cl_crosshairusealpha true
cl_crosshairalpha 240
cl_crosshaircolor 5
cl_crosshair_drawoutline false
cl_crosshairgap_useweaponvalue false
cl_crosshairgap -2
cl_crosshairsize 2.533446
cl_crosshairthickness .5
cl_crosshair_t false
cl_crosshairdot false
cl_crosshair_recoil false
cl_crosshair_friendly_warning 1
cl_crosshair_sniper_width 1

// Weapon model
cl_prefer_lefthanded true
bind "f3" switchhands

// Movement binds
bind "mwheeldown" "+jump"

// Weapon binds
bind "p" "slot7" // flashbang
bind "4" "slot8" // smoke
bind "g" "slot6" // he
bind "x" "slot10" // molly

// Practice binds
bind "u" "sv_rethrow_last_grenade"
bind "alt" "sv_cheats true; noclip"

// UI settings
cl_teamid_overhead_mode 3 // weapons over head
cl_teamcounter_playercount_instead_of_avatars true
con_enable true
bind "F4" "toggleconsole"
cl_grenadecrosshairdelay_smoke .7
cl_grenadecrosshairdelay_decoy .7
cl_grenadecrosshairdelay_explosive .7
cl_grenadecrosshairdelay_fire .7
cl_grenadecrosshairdelay_flash .7